version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-code-review-backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
    container_name: ai-code-review-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
